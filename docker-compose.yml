version: '3.9'
services:
  app:
    build: .
    ports:
      - "4100:4100"
    environment:
      PORT: 4100
      TRAVELCONNECT_DB_PATH: /app/travelconnect.sqlite
      JWT_SECRET: change-me-in-production
      ADMIN_EMAIL: admin@example.com
      ADMIN_PASSWORD: Admin123!
    volumes:
      - .:/app
